  generator: BRollGenerator
  primary_model: veo-3.1
  primary_endpoint: "Vertex AI veo-3.1 (FREE via GCP Marketplace)"
  audio_chain:
    - "Veo native ambient (no overlay needed)"
  expected_duration_sec: 4
  expected_cost_usd: 0.00
  output_label: "veo-3.1-standard/broll (tier N)"
  prompt_allocation:
    location_directive: "first 200 chars — atmosphere + time-of-day + weather"
    framing_recipe: "next 100 chars — wide / aerial / track"
    ambient_audio: "next 100 chars — for Veo's native audio gen"
  failure_modes_to_watch:
    - taxonomy_id: adherence
      note: "vertical framing directive critical (Phase 9 Issue 1)"
  canonical_prestige_references:
    - blade-runner-2049-opening
    - no-country-opening
    - the-bear-pilot
  director_notes: >
    Free via Vertex AI Marketplace. Veo's native ambient is its strength
    here — no SFX overlay needed. Vertical-framing directive is critical
    for 9:16 commercial work (Phase 9 Issue 1 fix).

- beat_type: VOICEOVER_OVER_BROLL
  generator: VoiceoverBRollGenerator
  primary_model: veo-3.1
  primary_endpoint: "Vertex AI veo-3.1 (FREE via GCP Marketplace)"
  audio_chain:
    - "fal-ai/elevenlabs/tts/eleven-v3 (V.O. mixed in post)"
  expected_duration_sec: 5
  expected_cost_usd: 0.01
  output_label: "veo-3.1-standard/vo-broll + elevenlabs"
  prompt_allocation:
    visual_directive: "first 250 chars — what we SEE while VO speaks"
    vo_pacing_directive: "next 100 chars — silent-mouth-allowed (V.O. only)"
    framing_recipe: "remaining — wide / observational"
  failure_modes_to_watch:
    - taxonomy_id: lipsync_drift
      note: "V.O. is silent-mouth by design — score lipsync_integrity = 100"
    - taxonomy_id: adherence
      note: "Visual must match V.O. tonally without literal illustration"
  canonical_prestige_references:
    - guinness-surfer
    - no-country-opening
    - nike-dream-crazy
  director_notes: >
    Voice-over mixed in post-production (Stage 4 music ducking handles VO
    layer). Silent mouth is intentional. Visual must be tonally aligned
    to VO without becoming literal illustration of the words.

- beat_type: TEXT_OVERLAY_CARD
  generator: TextOverlayCardGenerator
  primary_model: ffmpeg
  primary_endpoint: "local — sharp SVG → PNG → ffmpeg still→MP4"
  audio_chain: []
  expected_duration_sec: "varies (1-3s)"
  expected_cost_usd: 0.00
  output_label: "ffmpeg/text-card"
  prompt_allocation:
    typography_directive: "first 200 chars — font, weight, kerning, color"
    text_copy: "next — actual text"
    safe_area: "8.5%-91.5% horizontal, 220px vertical bottom safe-area"
  failure_modes_to_watch:
    - taxonomy_id: text_garble
      note: "non-applicable here (deterministic typography); but verify spelling pre-emit"
  director_notes: >
    Deterministic ffmpeg + sharp render — not generation. Use for
    title cards, end cards, captions. Fully reliable; no AI failure modes.
    sharp SVG generates the typography; ffmpeg builds the MP4.

- beat_type: SCENE_BRIDGE
  generator: BridgeBeatGenerator
  primary_model: veo-3.1
  primary_endpoint: "Vertex AI veo-3.1 (FREE via GCP Marketplace)"
  audio_chain:
    - "Veo native ambient"
  expected_duration_sec: 2
  expected_cost_usd: 0.00
  output_label: "veo-3.1-standard/bridge (tier N)"
  prompt_allocation:
    transition_directive: "first 200 chars — bridge_to_next descriptor from screenplay"
    visual_continuity: "next 100 chars — endframe of prior scene → start hint of next"
  failure_modes_to_watch:
    - taxonomy_id: adherence
      note: "Visual continuity between scenes is the test"
  director_notes: >
    Phase 6.1 addition. Inserted between scenes when Gemini emits
    bridge_to_next. Veo's first/last frame control makes it ideal for
    visual continuity bridging.
