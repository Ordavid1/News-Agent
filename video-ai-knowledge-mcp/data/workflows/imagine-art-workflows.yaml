# ─── Cinematic Category ───────────────────────────────────────────────────────

- name: "Cinematic Scenes 2.0"
  source: imagine-art
  platform: ImagineArt Flow
  category: cinematic
  description: >
    Create multi-shot cinematic video scenes with consistent characters and environments.
    Visual DAG-based workflow with 5+ scene groups, each containing: Prompt nodes → Image
    generation (Nano Banana Pro) → Video generation (Kling 2.5 Pro Turbo). Scenes are
    visually grouped as colored regions in the DAG editor.
  node_types_used:
    - "Prompt (text input with detailed cinematic descriptions)"
    - "Image (Nano Banana Pro — fast image generation)"
    - "Video (Kling 2.5 Pro Turbo — image-to-video)"
    - "Reference Image connections between nodes"
  models_used:
    image: "Nano Banana Pro"
    video: "Kling 2.5 Pro Turbo"
  structure:
    - "5+ scene groups, each containing 3-4 parallel shot chains"
    - "Each chain: Prompt → Image (Nano Banana Pro) → Video (Kling 2.5 Pro Turbo)"
    - "Reference images feed across scenes for consistency"
    - "Prompts use professional cinematography language (shot type, camera movement, lighting, aspect ratio)"
    - "Prompts include --ar, --stylize, --v, --q parameters"
  prompt_style: >
    Detailed cinematic prompts with anamorphic aspect ratios (21:9), specific camera movements
    (tracking, zoom, tilt), lighting descriptions (rim light, volumetric beams, god rays),
    and atmosphere keywords (photorealistic, 8k, film grain, lens flares).
  key_techniques:
    - "Multi-shot scene composition with grouped DAG regions"
    - "Character and environment consistency via reference image chains"
    - "Professional cinematography prompt engineering"
    - "Nano Banana Pro for fast/cheap base frames → Kling for video animation"

