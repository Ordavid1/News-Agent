# Runway Workflow: Seamless Transitions
# Source: featured-workflow-id=364

name: Seamless Transitions
source: runway
platform: Runway Workflows
description: >
  Creates a multi-scene video with seamless visual transitions between shots.
  Each scene flows naturally into the next through careful end-frame/start-frame matching.
  Uses parallel processing tracks for different scene elements.
category: transitions-effects
estimated_cost: "~150-300 credits"
complexity: advanced

steps:
  - name: Scene Planning (LLM)
    type: llm-processing
    model: Runway Built-in LLM
    description: "Plans multiple scenes with transition points described in detail"

  - name: Scene Image Generation (×N)
    type: image-generation
    model: Runway Gen 4.5
    description: "Generates key frames for each scene"

  - name: Transition Frame Generation
    type: image-generation
    model: Runway Gen 4.5
    description: "Generates intermediate frames that bridge between scenes"

  - name: Video Generation per Scene
    type: video-generation
    model: Runway Gen 4.5
    description: "Each scene generated with end-frame matching next scene's start"

  - name: Assembly with Transitions
    type: concatenation
    model: null
    description: "Final assembly with seamless cross-scene transitions"

key_techniques:
  - "End-frame of scene N matches start-frame of scene N+1"
  - "Parallel processing tracks (green=images, blue=transitions, pink=compositing)"
  - "Multiple LLM nodes for scene description refinement"

