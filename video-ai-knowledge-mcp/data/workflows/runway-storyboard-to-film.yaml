# Runway Workflow: Storyboard to Film
# Source: https://app.runwayml.com/video-tools/workflows (featured-workflow-id=661)

name: Storyboard to Film
source: runway
platform: Runway Workflows
description: >
  Transforms a story input (logline, synopsis, or script) into a cohesive multi-shot film.
  Uses LLM to create an 8-shot storyboard with character sheets, generates images for each shot,
  then produces video for each panel with consistent characters and style.
category: narrative-production
estimated_cost: "~200-400 credits on Runway"
complexity: advanced

steps:
  - name: Story Input
    type: input
    model: null
    description: "User provides logline (1-3 sentences), synopsis (1-3 paragraphs), or full script"

  - name: Storyboard System Prompt (LLM)
    type: llm-processing
    model: Runway Built-in LLM
    description: >
      AI storyboard architect transforms input into 8-shot visual sequence with narrative arc.
      Detects input type and structures: Logline → Setup(2) + Journey(4) + Resolution(2).
      Extracts brand elements, key props, setting anchors, and visual motifs.
      Preserves screenplay shot types (WIDE, CU, OTS, POV) and camera movements (PAN, DOLLY, CRANE).
    output: "JSON with 8 shot descriptions + character sheet (ID:1)"

  - name: Character Sheet Generation
    type: image-generation
    model: Runway Gen 4.5
    description: "Generates character reference sheet from shot ID:1 description for consistency"

  - name: Shot Image Generation (×8)
    type: image-generation
    model: Runway Gen 4.5
    description: "Generates key frame image for each of the 8 shots using character reference"

  - name: Video Generation (×8)
    type: video-generation
    model: Runway Gen 4.5
    description: "Converts each shot image into 5-10s video clip with specified camera movement"

  - name: Video Assembly
    type: concatenation
    model: null
    description: "Sequences all 8 clips into final film with transitions"

key_techniques:
  - "8-shot narrative structure with clear arc"
  - "Character sheet ensures visual consistency"
  - "Shot type variety (wide, medium, close-up, aerial)"
  - "Camera direction extraction from screenplay notation"
  - "Brand element priority tracking across shots"
  - "Transition hints between consecutive shots"

prompt_architecture:
  system_prompt_role: "Storyboard architect"
  output_format: "Structured JSON per shot"
  shot_structure:
    - id: "Sequential number (1=character sheet)"
    - description: "Rich visual description"
    - shot_type: "WIDE/MEDIUM/CU/AERIAL/etc."
    - camera_movement: "PAN/DOLLY/CRANE/TRACKING/etc."
    - lighting: "Time of day, mood, color temperature"
    - action: "Character and scene dynamics"
    - transition: "How this shot connects to next"

