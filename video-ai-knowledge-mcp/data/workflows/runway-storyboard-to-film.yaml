    type: llm-processing
    model: Runway Built-in LLM
    description: "Enhances description with cinematic language and camera direction"

  - name: Image Generation
    type: image-generation
    model: Runway Gen 4.5
    description: "Generates key frame for B-roll shot"

  - name: Video Generation
    type: video-generation
