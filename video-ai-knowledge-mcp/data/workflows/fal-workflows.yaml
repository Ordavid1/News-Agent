  source: fal
  platform: fal.ai Workflows
  description: >
    Virtual try-on workflow. Takes garment images and model photos as inputs,
    creates realistic try-on images and animated videos using ByteDance models.
  category: virtual-try-on
  estimated_cost: "~$3-8"
  clones: 173

  steps:
    - name: Garment + Model Input
      type: input
      model: null
      description: "Garment photo and model/person photo"

    - name: Try-On Generation
      type: image-generation
      model: ByteDance VTON model
      description: "Generates person wearing the garment"

    - name: Video Animation
      type: video-generation
      model: ByteDance video model
      description: "Animates the try-on result into a short video"

  key_techniques:
