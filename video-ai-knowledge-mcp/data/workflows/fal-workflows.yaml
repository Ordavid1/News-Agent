# ─── Born Elsewhere ──────────────────────────────────────────────────────────

- name: Born Elsewhere
  source: fal
  platform: fal.ai Workflows
  description: >
    The viral "Born Elsewhere" trend — reimagines a person as if they were born in
    a different country. Takes a portrait and country input, generates culturally
    transformed images and video.
  category: viral-trend
  estimated_cost: "~$2-5"
  clones: 17

  steps:
    - name: Portrait + Country Input
      type: input
      model: null
      description: "User provides portrait photo and target country"

    - name: Cultural Transformation (LLM)
      type: llm-processing
      model: LLM
      description: "Generates culturally appropriate transformation prompt"

    - name: Image Generation
      type: image-generation
      model: image model
      description: "Generates transformed portrait"

    - name: Video Generation
      type: video-generation
      model: video model
      description: "Animates the transformed portrait"

