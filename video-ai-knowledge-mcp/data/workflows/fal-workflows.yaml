# fal.ai Workflow Templates
# Source: https://fal.ai/workflows/templates

# ─── Kling Multi-Shot Creator ───────────────────────────────────────────────

- name: Kling Multi-Shot Creator
  source: fal
  platform: fal.ai Workflows
  description: >
    Generates a 15-second multi-shot video with 3 shots and full visual consistency.
    Uses LLM to plan cinematic shots, generates a base image, then produces each
    shot as image-to-video with Kling 3 Pro, maintaining continuity across shots.
  category: multi-shot-video
  estimated_cost: "$1.99"
  complexity: advanced
  api_endpoint: "fal.stream('workflows/template/kling-multi-shot-creator', { input: { prompt: '...' } })"
  clones: 128

  steps:
    - name: Shot Planning (LLM)
      type: llm-processing
      model: OpenRouter (any model)
      description: >
        Elite cinematic director AI designs exactly 3 shots forming a cohesive sequence.
        Outputs JSON with shot prompts (max 512 chars each), durations (3-5s), and base_image_prompt.
        Ensures visual continuity, narrative flow, and cinematic variety.
      output: "JSON: {shots: [{shot_number, prompt, duration}], total_duration, base_image_prompt}"

    - name: Shot Extraction (LLM ×8)
      type: llm-processing
      model: OpenRouter (any model)
      description: >
        8 parallel LLM calls extract individual fields from the planning JSON:
        shot 1 prompt, shot 1 duration, shot 2 prompt, shot 2 duration,
        shot 3 prompt, shot 3 duration, total_duration, base_image_prompt.

    - name: Base Image Generation
      type: image-generation
      model: Nano Banana Pro (fal-ai/nano-banana-pro)
      description: "Generates the first frame photograph from base_image_prompt. Sub-second generation."

    - name: Image Compression
      type: utility
      model: workflow-utilities/compress-image
      description: "Compresses base image for optimal Kling input size"

    - name: Shot Video Generation (×3)
      type: video-generation
      model: Kling Video v3 Pro (fal-ai/kling-video/v3/pro/image-to-video)
      description: >
        Each shot generated as image-to-video using the base image (shot 1) or
        previous shot's last frame (shots 2-3). Duration per shot from planning step.

    - name: Video Concatenation
      type: concatenation
      model: built-in
      description: "Stitches all 3 shot videos into final 15s output"

  key_techniques:
    - "LLM-as-director pattern: AI plans the entire cinematic sequence"
    - "JSON structured output for precise field extraction"
    - "512-char prompt limit per shot for optimal Kling adherence"
    - "Base image bridges text→image→video pipeline"
    - "Nano Banana for speed/cost-efficient frame generation"
    - "Parallel LLM extraction for workflow efficiency"

  prompt_architecture:
    role: "Elite cinematic director and AI video prompt engineer"
    shot_requirements:
      - "Subject description (appearance, position, expression, action)"
      - "Camera specifications (shot type, movement, lens feel)"
      - "Lighting & atmosphere (time of day, direction, mood)"
      - "Motion & action (what happens during the shot)"
      - "Transition hint (how this shot connects to next)"
    constraints:
      - "Exactly 3 shots"
      - "Each prompt under 512 characters"
      - "Duration 3-5s per shot, max 15s total"
      - "Visual consistency across all shots"

