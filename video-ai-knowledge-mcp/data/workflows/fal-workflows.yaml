# ─── Documentary ─────────────────────────────────────────────────────────────

- name: Documentary
  source: fal
  platform: fal.ai Workflows
  description: >
    Takes a text input (scene description) and transforms it into a full documentary-style
    video with narration. Uses Seedream for images, Seedance for video, ElevenLabs for
    voiceover, and ffmpeg for assembly. Full text-to-documentary pipeline.
  category: documentary
  estimated_cost: "$11.97"
  complexity: advanced
  clones: 80

  steps:
    - name: Scene Planning (LLM ×9)
      type: llm-processing
      model: fal-ai/any-llm
      description: "Multiple LLM calls to plan scenes, generate narration scripts, and create image prompts"

    - name: Image Generation (×6)
      type: image-generation
      model: bytedance/dreamina/v3.1/text-to-image (Seedream)
      description: "Generates key frame images for each documentary scene using Seedream"

    - name: Text Concatenation (×6)
      type: utility
      model: fal-ai/text-concat
      description: "Combines text elements for prompts and narration"

    - name: Video Generation (×12)
      type: video-generation
      model: bytedance/seedance/v1/pro/image-to-video
      description: "Converts each scene image into video clips using Seedance"

    - name: Frame Extraction (×8)
      type: utility
      model: fal-ai/ffmpeg-api/extract-frame
      description: "Extracts key frames from generated videos for continuity"

    - name: Narration Generation
      type: audio-generation
      model: fal-ai/elevenlabs/tts/eleven-v3
      description: "Generates professional voiceover narration using ElevenLabs"

    - name: Audio-Video Merge
      type: utility
      model: fal-ai/ffmpeg-api/merge-audio-video
      description: "Combines narration audio with video clips"

    - name: Final Video Merge
      type: concatenation
      model: fal-ai/ffmpeg-api/merge-videos
      description: "Assembles all scenes into final documentary"

  key_techniques:
    - "Seedream→Seedance pipeline (ByteDance ecosystem)"
    - "Frame extraction for cross-scene continuity"
    - "ElevenLabs TTS for professional narration"
    - "FFmpeg utilities for audio/video processing"
    - "12 parallel video generations for speed"
    - "9 LLM calls for comprehensive scene planning"

