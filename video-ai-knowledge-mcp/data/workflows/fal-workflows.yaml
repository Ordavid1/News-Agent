# ─── Game Assets ─────────────────────────────────────────────────────────────

- name: Game Assets
  source: fal
  platform: fal.ai Workflows
  description: >
    Creates 3D game assets from text descriptions. Uses Seedream to generate object images,
    Seedream Edit to create multi-angle views, then Rodin v2 to convert to 3D.
  category: 3d-assets
  estimated_cost: "~$5-10"
  clones: 74

  steps:
    - name: Object Description
      type: input
      model: null
      description: "Text describing the game asset"

    - name: Object Generation
      type: image-generation
      model: Seedream
      description: "Generates the object image"

    - name: Multi-Angle Generation
      type: image-editing
      model: Seedream Edit
      description: "Generates photos of the object from different angles"

    - name: 3D Conversion
      type: 3d-generation
      model: Rodin v2
      description: "Converts multi-angle images into a 3D model"

  key_techniques:
    - "Text → Image → Multi-angle → 3D pipeline"
    - "Seedream ecosystem (generation + editing)"
    - "Rodin v2 for image-to-3D conversion"
