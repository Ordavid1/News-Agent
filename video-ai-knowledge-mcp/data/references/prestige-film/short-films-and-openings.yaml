references:
  - id: no-country-opening
    title: "No Country for Old Men — opening monologue + landscape"
    year: 2007
    director: "Coen Brothers"
    cinematographer: "Roger Deakins"
    format: prestige-film
    genre: thriller
    duration_sec: 240
    style_categories:
      - hyperreal_premium
      - gritty_real
    visual_grammar: "West Texas wide landscapes; slow-pan over arid plains; Tommy Lee Jones voiceover over deliberate stillness."
    narrative_grammar: "Voice-over thesis ('You can't stop what's coming') over visual essay; tonal contract: this story is about endurance."
